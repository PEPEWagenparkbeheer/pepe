name: BREIN + leads sync (cron)

# Gratis externe scheduler: roept elke 30 min het beveiligde cron-endpoint aan,
# dat de BREIN-mailboxen synct én nieuwe leads uit info@ ophaalt.
# Vervangt de Vercel-native cron (die op het gratis plan maar 1x/dag mag).

on:
  schedule:
    - cron: '7,37 * * * *'   # elke 30 min, net naast het hele/halve uur
  workflow_dispatch: {}        # handmatig te starten via de Actions-tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Roep brein/leads cron aan
        run: |
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://flow.pepewagenparkbeheer.nl/api/brein/cron)
          echo "HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" = "200"
